{% extends "base.html" %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2><i class="fas fa-key"></i> {{ _t('forgot_password_title') }}</h2>
        <p class="forgot-desc" style="color: #666; font-size: 0.95rem; margin-bottom: 20px; text-align: center;">
            {{ _t('forgot_password_subtitle') }}
        </p>

        <form action="{{ url_for('forgot_password') }}" method="POST">
            <input type="hidden" name="type" value="{{ login_type }}">
            <div class="form-group">
                <label>{{ _t('label_email') }}</label>
                <input type="email" name="email" placeholder="{{ _t('enter_email') }}" required>
            </div>
            
            <button type="submit" class="premium-submit-btn" style="margin-bottom: 15px;">
                {{ _t('send_reset_link_btn') }} <i class="fas fa-paper-plane"></i>
            </button>
            
            <div style="text-align: center; margin-top: 10px;">
                {% if login_type == 'client' %}
                <a href="{{ url_for('client_login') }}" style="color: #4caf50; text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> {{ _t('back_to_login') }}
                </a>
                {% else %}
                <a href="{{ url_for('employee_login') }}" style="color: #4caf50; text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> {{ _t('back_to_login') }}
                </a>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
