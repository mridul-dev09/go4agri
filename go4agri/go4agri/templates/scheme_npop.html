{% extends 'base.html' %}

{% block content %}
<section class="section-container">
    <h2 class="section-title">{{ _t('scheme_npop') }}</h2>
    <div
        style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
        <div style="margin-bottom: 30px; background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px dashed #ccc; display: inline-block;">
            <h3 style="color: #2d5a27; margin: 0;">NPOP Certification</h3>
            <p style="color: #666; font-size: 1.1rem; margin: 5px 0 0;">Coming Soon</p>
        </div>
        <p style="color: #666; font-size: 1.1rem; line-height: 1.8; max-width: 800px; margin: 0 auto; text-align: left;">
            Detailed information about NPOP (National Programme for Organic Production) will be published here soon.
        </p>
        <div style="margin-top: 40px;">
            <a href="{{ url_for('certification_schemes') }}" class="btn-outline">Back to Schemes</a>
        </div>
    </div>
</section>
{% endblock %}
