{% extends "base.html" %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2><i class="fas fa-users"></i> {{ _t('client_login_title') }}</h2>
        <form action="/login" method="POST">
            <input type="hidden" name="login_type" value="client">
            <div class="form-group">
                <label>{{ _t('label_email') }}</label>
                <input type="text" name="email" placeholder="{{ _t('enter_email') }}" required>
            </div>
            <div class="form-group">
                <label>{{ _t('password_label') }}</label>
                <input type="password" name="password" placeholder="{{ _t('enter_password') }}" required>
            </div>
            <div class="forgot-password-link-wrapper" style="margin-bottom: 20px; text-align: right;">
                <a href="{{ url_for('forgot_password', type='client') }}" class="forgot-link" style="color: #4caf50; text-decoration: none; font-size: 0.9rem;">{{ _t('forgot_password_link') }}</a>
            </div>
            <button type="submit" class="premium-submit-btn">{{ _t('login_btn') }} <i class="fas fa-sign-in-alt"></i></button>
        </form>
    </div>
</div>
{% endblock %}
