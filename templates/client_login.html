{% extends "base.html" %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2><i class="fas fa-users"></i> {{ _t('client_login_title') }}</h2>
        <form action="/login" method="POST">
            <input type="hidden" name="login_type" value="client">
            <div class="form-group">
                <label>{{ _t('label_email') }}</label>
                <input type="text" name="email" placeholder="{{ _t('enter_email') }}" required>
            </div>
            <div class="form-group">
                <label>{{ _t('password_label') }}</label>
                <input type="password" name="password" placeholder="{{ _t('enter_password') }}" required>
            </div>
            <button type="submit" class="btn-gold">{{ _t('login_btn') }}</button>
        </form>
    </div>
</div>
{% endblock %}
