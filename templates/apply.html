{% extends 'base.html' %}

{% block content %}
<section class="section-container form-container">
    <h2 class="section-title">{{ _t('apply_title') }}</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="flash-item {{ category }}">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form action="/submit-application" method="POST">
        <div class="form-group">
            <label>{{ _t('company_name') }}</label>
            <input type="text" name="company_name" required>
        </div>

        <div class="form-group">
            <label>{{ _t('choose_program') }}</label>
            <select name="program_type" required>
                <option value="">{{ _t('select_program') }}</option>
                <option value="NPOP Organic">NPOP (National Programme for Organic Production)</option>
                <option value="USDA-NOP">USDA-NOP (United States Department of Agriculture)</option>
                <option value="OFIS">OFIS (Organic Food Information System)</option>
                <option value="INCT">INCT (International Certification & Training)</option>
            </select>
        </div>

        <button type="submit" class="btn-gold" style="width: 100%; border: none;">{{ _t('submit_application')
            }}</button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #666; font-size: 0.9rem;">
        {{ _t('login_notice') }}
    </p>
</section>
{% endblock %}
